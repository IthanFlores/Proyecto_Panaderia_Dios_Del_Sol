    <div id="Enlaces">

    <form action="POST" class="Contacto">
        <p class="contacto_p">Nombre</p>
        <input type="text" name="Nombre" class="contacto_input" placeholder="Escribe tu nombre" required>
        <p class="contacto_p"> Apellidos</p>
        <input type="text" name="Apellidos" class="contacto_input" placeholder="Escribe tu apellido" required>
        <p class="contacto_p">Telefono</p>
        <input type="tel" name="Telefono" class="contacto_input" placeholder="Escribe tu telefono" required>
        <p class="contacto_p"> Fecha de nacimiento</p>
        <input type="date" name="Fecha de nacimiento" class="contacto_input" required>
        <p class="contacto_p"> Correo Electronico </p>
        <input type="email" name="Email" class="contacto_input" placeholder="Escribe tu Email" required>
        <p class="contacto_p"> Contraseña </p>
        <input type="password" name="Contraseña" class="contacto_input" placeholder="Escribe tu contraseña" required>
        <input type="submit" value="Enviar" class="contacto_input input_submit">

    </form>
